input_dir:
  type: path
  widget: dir
  required: true
  default: ""
  description: 输入目录

output_items_dir:
  type: path
  widget: dir
  required: true
  default: ""
  description: 输出 JSON 目录,每份输入对应一份 JSON

llm_base_url:
  type: string
  widget: text
  required: true
  default: ""
  description: OpenAI 兼容 API 的基地址

llm_api_key:
  type: string
  widget: text
  required: false
  default: ""
  description: API Key,本地部署无认证时可留空

llm_model_name:
  type: string
  widget: text
  required: true
  default: "Qwen3.5-35B-A3B"
  description: 使用的模型名

llm_timeout:
  type: integer
  widget: number
  required: true
  default: 600
  description: 单次请求超时秒数

llm_max_tokens:
  type: integer
  widget: number
  required: true
  default: 4096
  description: 模型输出最大 token 数

llm_temperature:
  type: float
  widget: number
  required: true
  default: 0.1
  description: 采样温度

threshold_long_doc_chars:
  type: integer
  widget: number
  required: true
  default: 180000
  description: 超长文档字符数阈值,超过此值打印提示

# 按需增删字段。每个 config.yaml 里的字段都要在这里有声明。
