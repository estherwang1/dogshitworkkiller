llm_backend:
  type: enum
  widget: dropdown
  options: ["openai", "hiagent"]
  required: true
  default: openai
  description: 后端类型。openai 直连大模型 API,hiagent 走智能体代理

input_dir:
  type: path
  widget: dir
  required: true
  default: ""
  description: 输入目录,递归扫描其中的 .docx 文件

output_items_dir:
  type: path
  widget: dir
  required: true
  default: ""
  description: 识别结果 JSON 目录,每份输入对应一份 JSON

output_docx_dir:
  type: path
  widget: dir
  required: true
  default: ""
  description: 标注后的 docx 输出目录,保持输入的子目录结构

llm_base_url:
  type: string
  widget: text
  required: false
  default: "http://a.b.c.d:e/v1"
  description: OpenAI 兼容 API 的基地址(llm_backend 为 openai 时必填)

llm_api_key:
  type: string
  widget: text
  required: false
  default: ""
  description: API Key,本地部署无认证时可留空

llm_model_name:
  type: string
  widget: text
  required: false
  default: "Qwen3.5-35B-A3B"
  description: 使用的模型名(llm_backend 为 openai 时必填)

llm_timeout:
  type: integer
  widget: number
  required: true
  default: 600
  description: 单次请求超时秒数(两种后端通用)

llm_max_tokens:
  type: integer
  widget: number
  required: true
  default: 8192
  description: 模型输出最大 token 数(openai 后端生效,hiagent 侧在智能体配置里设)

llm_temperature:
  type: float
  widget: number
  required: true
  default: 0.1
  description: 采样温度(openai 后端生效,hiagent 侧在智能体配置里设)

max_chars_per_call:
  type: integer
  widget: number
  required: true
  default: 80000
  description: 单次调用最大字符数,超过此值会分块调用。约对应 80K token

overlap_blocks:
  type: integer
  widget: number
  required: true
  default: 20
  description: 分块调用时相邻段的重叠段落数,过小可能漏识别边界,过大浪费 token

hiagent_base_url:
  type: string
  widget: text
  required: false
  default: ""
  description: HiAgent API 基地址,如 http://x.x.x.x:port/api/proxy/api/v1(llm_backend 为 hiagent 时必填)

hiagent_api_key:
  type: string
  widget: text
  required: false
  default: ""
  description: HiAgent 的 ApiKey(llm_backend 为 hiagent 时必填)

hiagent_user_id:
  type: string
  widget: text
  required: false
  default: batch-runner
  description: HiAgent 用户标识,1-20 字符,用于检索和统计
